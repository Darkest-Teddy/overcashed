<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OVERCASHED — Intro</title>
<style>
  :root {
    --stage:    #EAEAEA;
    --final:    #FCFDFC;   /* letters end white, like the logo */
    --ink:      #1F5F44;   /* logo's deep green outline */
    --crest:    #2FA36B;
    --guide:    #0EA55B;
    --stroke:   #3A3A3A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    /* transparent so an embedding page shows through once the overlay exits */
    background: transparent;
    font-family: "Archivo", system-ui, sans-serif;
    color: var(--final);
    overflow: hidden;
  }

  /* ---------- intro overlay ---------- */
  #overlay {
    position: fixed;
    inset: 0;
    background: var(--stage);
    display: grid;
    place-items: center;
    z-index: 10;
    will-change: opacity, transform;
  }
  #stage { display: block; width: 100%; height: 100%; }

  /* skeletal letterform outline */
  #outlinePath {
    fill: none;
    stroke: var(--stroke);
    stroke-width: 1.4;
    stroke-linejoin: round;
    stroke-linecap: round;
    vector-effect: non-scaling-stroke;
  }

  /* blueprint guide system */
  .gl-line    { stroke: var(--guide); stroke-width: 1; shape-rendering: crispEdges; }
  .gl-square  { fill: var(--guide); }
  .gl-circle  { fill: none; stroke: var(--guide); stroke-width: 1.5; }
  .gl-corner  { fill: none; stroke: var(--guide); stroke-width: 1; }

  .blackBody { fill: var(--final); }
  .greenCrest { fill: var(--crest); }

  /* thick sticker outline that emerges as the letters fill (logo look) */
  #outlineThick {
    fill: none;
    stroke: var(--ink);
    stroke-linejoin: round;
    stroke-linecap: round;
    opacity: 0;
  }

  /* blueprint props (logo assets) — stroke width is set per-asset in JS
     (width/scale) instead of vector-effect:non-scaling-stroke, because
     Chrome dashes non-scaling strokes in screen space, which desyncs the
     draw-on animation from getTotalLength() and leaves gaps. */
  .asset-line {
    fill: none;
    stroke: var(--stroke);
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .asset-fill { stroke: none; }
</style>
</head>
<body>
  <!-- ===== intro overlay ===== -->
  <div id="overlay">
    <svg id="stage" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="wordClip"><path id="clipPath" d=""></path></clipPath>
        <clipPath id="drainClip"><rect id="drainRect" x="0" y="0" width="0" height="0"></rect></clipPath>
      </defs>
      <g id="wordGroup" clip-path="url(#drainClip)">
        <g id="assets"></g>
        <path id="outlineThick" d=""></path>
        <g id="liquid" clip-path="url(#wordClip)">
          <path class="greenCrest" id="greenCrest" d=""></path>
          <path class="blackBody" id="blackBody" d=""></path>
        </g>
        <path id="outlinePath" d=""></path>
        <g id="guides">
          <g id="glines"></g>
          <g id="ganchors"></g>
        </g>
      </g>
    </svg>
  </div>

    const items = [

      { def: "paperStack", x: g.x0 - 1.10*fs, y: g.capTop - 0.85*fs, s: fs/90 * 1.05, rot: -4,  t0: 0.45 },
      { def: "flySheet",   x: g.x0 - 0.10*fs, y: g.capTop - 1.00*fs, s: fs/26 * 0.34, rot: 12,  t0: 0.85 },
      { def: "flySheet",   x: g.x0 - 1.30*fs, y: g.capTop - 1.15*fs, s: fs/26 * 0.26, rot: -18, t0: 1.05 },
      { def: "fanPapers",  x: g.x0 - 1.15*fs, y: g.baseY - 0.05*fs,  s: fs/70 * 1.00, rot: 3,   t0: 0.70 },
      { def: "bill",       x: g.x0 - 0.50*fs, y: g.baseY + 0.45*fs,  s: fs/44 * 0.70, rot: -7,  t0: 1.15 },
      { def: "coin",       x: g.x0 + 0.40*fs, y: g.baseY + 0.50*fs,  s: fs/24 * 0.42, rot: 0,   t0: 1.30 },
      // right cluster — laptop with the green charts
      { def: "laptop",     x: g.x1 - 1.45*fs, y: g.capTop - 1.15*fs, s: fs/96 * 1.15, rot: 2,   t0: 0.60 },
      { def: "paperStack", x: g.x1 - 2.30*fs, y: g.capTop - 0.75*fs, s: fs/90 * 0.60, rot: 5,   t0: 0.95 },
      { def: "coin",       x: g.x1 + 0.40*fs, y: g.capTop - 0.35*fs, s: fs/24 * 0.38, rot: 0,   t0: 1.50 },
      // bottom-right — stamps, the card, loose coins
      { def: "stamp",      x: g.x1 - 1.50*fs, y: g.baseY + 0.15*fs,  s: fs/54 * 0.80, rot: -3,  t0: 0.85 },
      { def: "card",       x: g.x1 - 0.70*fs, y: g.baseY + 0.28*fs,  s: fs/60 * 1.15, rot: -9,  t0: 1.05 },
      { def: "coin",       x: g.x1 - 0.05*fs, y: g.baseY + 0.90*fs,  s: fs/24 * 0.40, rot: 0,   t0: 1.45 }
    ];
    for (const it of items) {
      const def = DEFS[it.def];
      if (!def) continue;
      const x = Math.max(6, Math.min(W - fs, it.x));
      const y = Math.max(6, Math.min(H - fs, it.y));
      const grp = mk(assetsG, "g", { transform: "translate(" + x + "," + y + ") rotate(" + (it.rot||0) + ") scale(" + it.s + ")" });
      for (const f of def.fills) {
        const el = mk(grp, "path", { class: "asset-fill", d: f.d, fill: f.fill });
        el.style.opacity = 0;
        assetFillEls.push({ el, op: f.op });
      }
      (def.texts || []).forEach(t => {
        const el = mk(grp, "text", {
          x: t.x, y: t.y, "font-size": t.size, fill: t.fill,
          "font-family": "Archivo, Helvetica, Arial, sans-serif",
          "font-weight": t.weight || 500, "letter-spacing": t.spacing || "0"
        });
        el.textContent = t.content;
        el.style.opacity = 0;
        assetFillEls.push({ el, op: t.op != null ? t.op : 0.95 });
      });
      def.lines.forEach((entry, i) => {
        const isObj = typeof entry === "object";
        const attrs = { class: "asset-line", d: isObj ? entry.d : entry };
        const el = mk(grp, "path", attrs);
        if (isObj && entry.stroke) el.style.stroke = entry.stroke;
        // Compensate the group scale so strokes render ~constant on screen
        // while dashes stay in user units (keeps draw-on math exact).
        const baseW = isObj && entry.w ? entry.w : 1.4;
        el.style.strokeWidth = (baseW / it.s).toFixed(3);
        const len = el.getTotalLength();
        el.style.strokeDasharray = len;
        el.style.strokeDashoffset = len;
        assetLineEls.push({ el, len, t0: it.t0 + i * 0.09, dur: 0.55, done: false });
      });
    }
  }

  // ---------- glyph-vertex analysis ----------
  // Walk one contour's commands, return on-curve nodes with classification.
  function analyzeContour(cmds) {
    // build segment list (absolute coords already)
    let startX, startY, curX, curY;
    const segs = [];
    let hasCurve = false;
    for (const c of cmds) {
      if (c.type === "M") { startX = curX = c.x; startY = curY = c.y; }
      else if (c.type === "L") { segs.push({t:"L", x0:curX, y0:curY, x:c.x, y:c.y}); curX=c.x; curY=c.y; }
      else if (c.type === "C") { segs.push({t:"C", x0:curX, y0:curY, x1:c.x1,y1:c.y1, x2:c.x2,y2:c.y2, x:c.x, y:c.y}); curX=c.x; curY=c.y; hasCurve=true; }
      else if (c.type === "Q") { segs.push({t:"Q", x0:curX, y0:curY, x1:c.x1,y1:c.y1, x:c.x, y:c.y}); curX=c.x; curY=c.y; hasCurve=true; }
      else if (c.type === "Z") { if (Math.hypot(curX-startX, curY-startY) > 0.01) segs.push({t:"L", x0:curX, y0:curY, x:startX, y:startY}); curX=startX; curY=startY; }
    }
    const n = segs.length;
    if (n === 0) return { nodes: [], hasCurve };
    const endTan = s => s.t === "C" ? [s.x-s.x2, s.y-s.y2] : s.t === "Q" ? [s.x-s.x1, s.y-s.y1] : [s.x-s.x0, s.y-s.y0];
    const startTan = s => (s.t === "C" || s.t === "Q") ? [s.x1-s.x0, s.y1-s.y0] : [s.x-s.x0, s.y-s.y0];
    const norm = v => { const m = Math.hypot(v[0],v[1])||1; return [v[0]/m, v[1]/m]; };
    const nodes = [];
    for (let i = 0; i < n; i++) {
      const seg = segs[i], prev = segs[(i-1+n)%n];
      const tin = norm(endTan(prev)), tout = norm(startTan(seg));
      const dot = clamp01v(tin[0]*tout[0] + tin[1]*tout[1]);
      const ang = Math.acos(dot) * 180/Math.PI;        // turn at this node
      nodes.push({ x:seg.x0, y:seg.y0, ang, curveSide: (prev.t!=="L"||seg.t!=="L") });
    }
    return { nodes, hasCurve };
  }
  function clamp01v(v){ return v<-1?-1:v>1?1:v; }

  function buildMarkers(allContours) {
    const squares = [], circles = [];
    for (const cmds of allContours) {
      const { nodes } = analyzeContour(cmds);
      if (!nodes.length) continue;
      // corner nodes -> squares
      const cornerIdx = new Set();
      nodes.forEach((nd, i) => { if (nd.ang > 32) { squares.push([nd.x, nd.y]); cornerIdx.add(i); } });
      // extrema of the contour -> circles (top/bottom/left/right on-curve points)
      let iT=0,iB=0,iL=0,iR=0;
      nodes.forEach((nd,i) => {
        if (nd.y < nodes[iT].y) iT=i;
        if (nd.y > nodes[iB].y) iB=i;
        if (nd.x < nodes[iL].x) iL=i;
        if (nd.x > nodes[iR].x) iR=i;
      });
      [iT,iB,iL,iR].forEach(i => {
        if (cornerIdx.has(i)) return;            // a sharp corner stays a square
        const nd = nodes[i];
        if (!nd.curveSide) return;               // only round extrema get circles
        circles.push([nd.x, nd.y]);
      });
    }
    return { squares: dedupe(squares), circles: dedupe(circles) };
  }
  function dedupe(pts){
    const out = [];
    for (const p of pts){ if (!out.some(q => Math.hypot(q[0]-p[0], q[1]-p[1]) < 6)) out.push(p); }
    return out;
  }

  // ---------- layout ----------
  function layout() {
    const W = window.innerWidth, H = window.innerHeight;
    svg.setAttribute("width", W);
    svg.setAttribute("height", H);
    svg.setAttribute("viewBox", "0 0 " + W + " " + H);
    markerEls = [];
    glines.innerHTML = "";
    ganchors.innerHTML = "";
    wordGroup.style.transformOrigin = (W/2) + "px " + (H/2) + "px";

    if (FONT) layoutFromFont(W, H);
    else      layoutFallback(W, H);
  }

  function layoutFromFont(W, H) {
    const cx = W/2, ls = -0.02;                    // letter-spacing in em
    const upm = FONT.unitsPerEm;
    const glyphs = WORD.split("").map(ch => FONT.charToGlyph(ch));
    const advUnits = glyphs.reduce((s,g) => s + g.advanceWidth, 0);
    const target = 0.72 * W;
    // width(fs) = fs*(advUnits/upm) + ls*fs*(n-1)  ->  solve for fs
    const fontSize = target / (advUnits/upm + ls*(WORD.length-1));
    const scale = fontSize/upm;
    const lsPx = ls*fontSize;

    // cap height
    const capUnits = (FONT.tables.os2 && FONT.tables.os2.sCapHeight) ? FONT.tables.os2.sCapHeight : upm*0.7;

    // 1st pass measure total width, vertical centering target
    let totalW = 0;
    glyphs.forEach((g,i) => { totalW += g.advanceWidth*scale + (i<glyphs.length-1?lsPx:0); });
    const startX = cx - totalW/2;
    const capPx = capUnits*scale;
    const baseY = H/2 + capPx/2;                   // center caps vertically

    // build combined outline path + collect contours + glyph boundaries
    let dCombined = "";
    const contours = [];
    const bounds = [startX];
    let penX = startX;
    let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;

    glyphs.forEach((g, gi) => {
      // slight per-letter bounce, like the logo's hand-placed letters
      const jitter = (gi % 2 === 0 ? -1 : 1) * fontSize * 0.016;
      const p = g.getPath(penX, baseY + jitter, fontSize);
      dCombined += p.toPathData(2) + " ";
      // split this glyph's commands into contours (by M)
      let cur = null;
      p.commands.forEach(c => {
        if (c.type === "M") { if (cur) contours.push(cur); cur = [c]; }
        else if (cur) cur.push(c);
        ["x","x1","x2"].forEach(k => { if (c[k]!=null){ minX=Math.min(minX,c[k]); maxX=Math.max(maxX,c[k]); } });
        ["y","y1","y2"].forEach(k => { if (c[k]!=null){ minY=Math.min(minY,c[k]); maxY=Math.max(maxY,c[k]); } });
      });
      if (cur) contours.push(cur);
      penX += g.advanceWidth*scale + (gi<glyphs.length-1?lsPx:0);
      bounds.push(penX);
    });

    outlineEl.setAttribute("d", dCombined);
    clipEl.setAttribute("d", dCombined);
    outlineThick.setAttribute("d", dCombined);
    outlineThick.style.strokeWidth = (fontSize * 0.05).toFixed(2);

    const capTop = minY, bottom = maxY, x0 = minX, x1 = maxX, wordW = x1 - x0;

    buildBlueprint({ W, H, x0, x1, capTop, baseY, bottom, bounds, fontSize, wordW });

    const len = outlineEl.getTotalLength();
    outlineEl.style.strokeDasharray = len;
    outlineEl.style.strokeDashoffset = len;

    // markers from REAL vertices
    const { squares, circles } = buildMarkers(contours);
    const S = 8;
    squares.forEach(([x,y]) => {
      const el = mk(ganchors, "rect", { class:"gl-square", x:x-S/2, y:y-S/2, width:S, height:S });
      markerEls.push({ el, tx:(x-x0)/wordW });
    });
    circles.forEach(([x,y]) => {
      const el = mk(ganchors, "circle", { class:"gl-circle", cx:x, cy:y, r:11 });
      markerEls.push({ el, tx:(x-x0)/wordW });
    });

    setGeom(W, H, cx, x0, x1, capTop, baseY, bottom, wordW, fontSize, len);
    buildAssets(geom);
  }

  // simple fallback (no opentype) — keeps the piece working
  function layoutFallback(W, H) {
    const cx = W/2;
    const t = mk(clipEl.parentNode.parentNode, "text", {}); // not used; build text-based clip instead
    // use a <text> for clip + outline
    clipEl.removeAttribute("d");
    const fs = 0.115 * W;
    const tx = (parent) => {
      const e = mk(parent, "text", { x:cx, y:H/2, "text-anchor":"middle", "font-size":fs,
        "font-family":"'Luckiest Guy', Anton, Archivo, sans-serif", "letter-spacing":"-0.02em", "font-weight":"700" });
      e.textContent = WORD; return e;
    };
    const ct = tx(document.getElementById("wordClip"));
    const bb = ct.getBBox();
    const dy = H/2 - (bb.y + bb.height/2);
    ct.setAttribute("y", H/2 + dy);
    const bb2 = ct.getBBox();
    outlineEl.style.display = "none";
    const ot = tx(document.getElementById("wordGroup"));
    ot.setAttribute("y", H/2 + dy);
    ot.setAttribute("fill", "none"); ot.setAttribute("stroke", "var(--stroke)"); ot.setAttribute("stroke-width", 1.4);
    ot.id = "outlinePath";
    const baseY = H/2 + dy, capTop = bb2.y, bottom = bb2.y+bb2.height, x0=bb2.x, x1=bb2.x+bb2.width;
    buildBlueprint({ W, H, x0, x1, capTop, baseY, bottom, bounds:[x0,x1], fontSize:fs, wordW:bb2.width });
    setGeom(W,H,cx,x0,x1,capTop,baseY,bottom,bb2.width,fs,0);
    buildAssets(geom);
    t.remove();
  }

  function buildBlueprint({ W, H, x0, x1, capTop, baseY, bottom, bounds, fontSize, wordW }) {
    const padX = Math.max(40, fontSize*0.16);
    const overTop = fontSize*0.20, overBot = fontSize*0.22;
    // cap-height + baseline horizontals (extend well past the word)
    mk(glines, "line", { class:"gl-line", x1:x0-padX, y1:capTop, x2:x1+padX, y2:capTop });
    mk(glines, "line", { class:"gl-line", x1:x0-padX, y1:baseY,  x2:x1+padX, y2:baseY  });
    // vertical sidebearing guides at every glyph boundary
    bounds.forEach(bx => {
      mk(glines, "line", { class:"gl-line", x1:bx, y1:capTop-overTop, x2:bx, y2:baseY+overBot });
    });
    // outer frame verticals just past the word
    mk(glines, "line", { class:"gl-line", x1:x0-padX, y1:capTop-overTop, x2:x0-padX, y2:baseY+overBot });
    mk(glines, "line", { class:"gl-line", x1:x1+padX, y1:capTop-overTop, x2:x1+padX, y2:baseY+overBot });
    // small right-angle corner markers (top-left, bottom-right)
    const c = 16;
    mk(glines, "rect", { class:"gl-corner", x:x0-padX, y:capTop, width:c, height:c });
    mk(glines, "rect", { class:"gl-corner", x:x1+padX-c, y:baseY-c, width:c, height:c });
  }

  function setGeom(W,H,cx,x0,x1,capTop,baseY,bottom,wordW,fontSize,len){
    const wavelength = 0.30 * wordW;
    const AMP  = Math.max(12, fontSize*0.10);
    const GAP0 = Math.max(90, fontSize*0.55);
    drainRect.setAttribute("x",0); drainRect.setAttribute("y",0);
    drainRect.setAttribute("width",W); drainRect.setAttribute("height",H);
    geom = { W,H,cx,x0,x1,capTop,baseY,bottom,wordW,fontSize,wavelength,AMP,GAP0,len };
  }

  function surfacePath(level, amp, phase, x0, x1, bottom, wavelength) {
    const step = 7;
    let d = "M " + x0 + " " + bottom + " L " + x0 + " " + (level + amp*Math.sin(phase)).toFixed(2);
    for (let x = x0; x <= x1; x += step) {
      const y = level + amp * Math.sin((x - x0) / wavelength * 2*Math.PI + phase);
      d += " L " + x.toFixed(2) + " " + y.toFixed(2);
    }
    d += " L " + x1 + " " + (level + amp*Math.sin((x1-x0)/wavelength*2*Math.PI + phase)).toFixed(2);
    d += " L " + x1 + " " + bottom + " Z";
    return d;
  }

  // ---- frame ----
  function render(time) {
    const g = geom;
    const fillHeight = g.bottom - g.capTop;

    // PHASE 1 — contour draw
    const dprog = easeDraw(clamp01((time - T.drawStart) / T.drawTotal));
    if (g.len) outlineEl.style.strokeDashoffset = g.len * (1 - dprog);

    // blueprint props sketch themselves in around the word
    for (const a of assetLineEls) {
      const ap = easeDraw(clamp01((time - a.t0) / a.dur));
      if (ap >= 1) {
        // fully drawn — drop the dash entirely so no float residue shows
        if (!a.done) {
          a.el.style.strokeDasharray = "none";
          a.el.style.strokeDashoffset = 0;
          a.done = true;
        }
      } else {
        if (a.done) {
          a.el.style.strokeDasharray = a.len;
          a.done = false;
        }
        a.el.style.strokeDashoffset = a.len * (1 - ap);
      }
    }
    // ...and flood with color as the liquid crests
    const inkOn = smooth(3.35, 4.35, time);
    for (const f of assetFillEls) {
      f.el.style.opacity = (f.op * inkOn).toFixed(3);
    }

    // blueprint reveal: lines fade in fast, anchors pop as the sweep passes them
    const guideFade = 1 - smooth(T.guideFadeStart, T.guideFadeStart + T.guideFadeDur, time);
    glines.style.opacity = (clamp01(time/0.30) * guideFade * 0.92).toFixed(3);
    ganchors.style.opacity = guideFade.toFixed(3);
    for (const m of markerEls) {
      m.el.style.opacity = clamp01((dprog - m.tx) / 0.05).toFixed(3);
    }

    // PHASE 2/3 — liquid rise
    let pRaw = clamp01((time - T.fillStart) / T.fillDur);
    if (time < T.fillStart) pRaw = 0;
    const p = easeFill(pRaw);
    const phase = time * 3.0;
    const ampNow = g.AMP * (1 - smooth(0.72, 1.0, p));
    const gap = g.GAP0 * (1 - p);
    const greenLevel = g.bottom - p * fillHeight;
    const blackLevel = Math.min(g.bottom, greenLevel + gap);
    const drawBottom = g.bottom + g.AMP + 4;
    if (p <= 0) { greenCrest.setAttribute("d",""); blackBody.setAttribute("d",""); }
    else {
      greenCrest.setAttribute("d", surfacePath(greenLevel, ampNow, phase,       g.x0-2, g.x1+2, drawBottom, g.wavelength));
      blackBody.setAttribute("d",  surfacePath(blackLevel, ampNow, phase + 0.6, g.x0-2, g.x1+2, drawBottom, g.wavelength));
    }

    // outline merges into solid fill
    outlineEl.style.opacity = (1 - 0.7 * smooth(2.2, 4.0, time)).toFixed(3);

    // the thick green sticker outline emerges with the fill (logo look)
    outlineThick.style.opacity = smooth(3.1, 4.15, time).toFixed(3);

    // PHASE 4 — settle bounce
    let bounce = 0;
    if (time >= T.holdStart && time < T.holdStart + 0.32) {
      const bt = (time - T.holdStart) / 0.32;
      bounce = Math.sin(bt * Math.PI) * -2 * (1 - bt);
    }
    wordGroup.style.transform = "translateY(" + bounce.toFixed(2) + "px) rotate(" + TILT + "deg)";

    // PHASE 5 — drain out the bottom
    // (edge sweeps from the very top so props above the cap line never clip)
    const dp = easeIn(clamp01((time - T.drainStart) / T.drainDur));
    const edgeY = dp * (g.bottom + 8);
    drainRect.setAttribute("y", edgeY);
    drainRect.setAttribute("height", Math.max(0, g.H - edgeY));

    const ep = clamp01((time - T.exitStart) / T.exitDur);
    overlay.style.opacity = (1 - ep).toFixed(3);
    overlay.style.transform = "translateY(" + (ep * 2).toFixed(2) + "%)";
  }

  function finish() {
    overlay.style.opacity = 0;
    overlay.style.pointerEvents = "none";
    try {
      if (window.parent !== window) window.parent.postMessage("overcashed-intro-done", "*");
    } catch (e) { /* standalone */ }
  }

  window.__seek = function (t) { if (!geom) layout(); render(t); };

  function play() {
    layout();
    if (reduced) {
      if (geom.len) outlineEl.style.strokeDashoffset = 0;
      guides.style.opacity = 0;
      outlineEl.style.opacity = 0.4;
      blackBody.setAttribute("d", surfacePath(geom.capTop, 0, 0, geom.x0-2, geom.x1+2, geom.bottom + geom.AMP, geom.wavelength));
      outlineThick.style.opacity = 1;
      for (const a of assetLineEls) {
        a.el.style.strokeDasharray = "none";
        a.el.style.strokeDashoffset = 0;
      }
      for (const f of assetFillEls) f.el.style.opacity = f.op;
      wordGroup.style.transform = "rotate(" + TILT + "deg)";
      overlay.style.transition = "opacity .6s ease";
      setTimeout(() => { overlay.style.opacity = 0; setTimeout(finish, 650); }, 900);
      return;
    }
    const start = performance.now();
    function loop(now) {
      const t = (now - start) / 1000;
      render(Math.min(t, T.end));
      if (t < T.end) requestAnimationFrame(loop);
      else finish();
    }
    requestAnimationFrame(loop);
  }

  const DEBUG = location.search.indexOf("debug") !== -1;
  function start() { if (DEBUG) layout(); else play(); }

  // Anton is embedded as base64 — no network needed.
  try {
    const b64 = document.getElementById("fontData").textContent.trim();
    const bin = atob(b64);
    const buf = new ArrayBuffer(bin.length);
    const view = new Uint8Array(buf);
    for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
    FONT = opentype.parse(buf);
  } catch (e) {
    FONT = null; // fallback <text> layout still works
  }
  start();
})();
</script>
</body>
</html>
